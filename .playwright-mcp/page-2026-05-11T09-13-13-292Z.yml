                              - paragraph [ref=e7220]:
                                - text: "6 Dev Business Ideas 1. Trading Bot Connect to SoSoValue API + SoDEX → build an auto-trading bot → sell monthly subscriptions. Stack: Python +"
                                - link "Web3.py" [ref=e7221] [cursor=pointer]:
                                  - /url: http://Web3.py
                                - text: "+ SoSoValue API 2. library Mobile Portfolio App Build a clean mobile app that shows SSI index performance + alerts. Stack: React Native + SoSoValue API SoSoValue offers a free API tier that scales to pro tools with real-time market data, historical trades, and institutional-grade analytics. 3. DeFi dApp on ValueChain Deploy smart contracts on ValueChain ValueChain supports multiple VMs including Orderbook VM and AppChains — think of it as mini-programs running on an open financial OS. Build a lending protocol, yield vault, or liquidity tool on top of it. 4. Data Dashboard for Traders Build a better UI on top of SoSoValue's raw API — custom charts, alerts, sector comparisons. Stack: Next.js + SoSoValue API + charting library 5. Custom Index Token Creator The SSI Protocol uses on-chain smart contracts to repackage multi-chain, multi-asset portfolios into Wrapped Tokens. Build a tool that lets anyone create their own themed index — charge a creation or management fee. 6. On-Chain Signal Marketplace Build a marketplace on ValueChain where traders sell their signals as on-chain subscriptions. Buyers pay in SOSO, signals execute automatically via smart contract."
