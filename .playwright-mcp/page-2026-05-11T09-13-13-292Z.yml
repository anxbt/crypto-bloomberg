                    - heading "⚡ What Should I Build?" [level=2] [ref=e2902]
                    - paragraph [ref=e2903]: Build agentic finance applications with SoSoValue's APIs and other supporting tools.
                    - paragraph [ref=e2904]:
                      - text: We are looking for agentic challengers to traditional incumbent finance businesses. Leveraging AI and SoSoValue's infrastructure, even
                      - strong [ref=e2905]: a single-person team can build impactful applications
                      - text: that function as a financial news agency, an index publisher or a fund manager --- and make such services available on-chain to users worldwide.
                    - paragraph [ref=e2906]: "A strong submission should demonstrate:"
                    - list [ref=e2907]:
                      - listitem [ref=e2908]: Clear user value
                      - listitem [ref=e2909]: A clear use case
                      - listitem [ref=e2910]: A complete flow from data input to actionable output
                    - heading "✅ Required" [level=3] [ref=e2911]
                    - list [ref=e2912]:
                      - listitem [ref=e2913]: Must genuinely integrate SoSoValue API
                      - listitem [ref=e2914]: Must have a clear use case and real user value
                      - listitem [ref=e2915]: Must complete a basic flow from data input to output
                      - listitem [ref=e2916]: Must provide verifiable demo materials and documentation
                    - heading "⭐ Bonus" [level=3] [ref=e2917]
                    - list [ref=e2918]:
                      - listitem [ref=e2919]: Integration with SoDEX API
                      - listitem [ref=e2920]: AI-enhanced functionality
                      - listitem [ref=e2921]: Ability to help users discover opportunities, generate signals, or explain markets
                      - listitem [ref=e2922]: Risk control, confirmation mechanisms, and security awareness
                      - listitem [ref=e2923]: A more complete flow from insight to action
                      - listitem [ref=e2924]: Better product experience (panels, bots, skills, or automated workflows)
                    - separator [ref=e2925]
