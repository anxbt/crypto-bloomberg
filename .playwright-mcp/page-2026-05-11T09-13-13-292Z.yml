                    - heading "🚀 What is SoSoValue?" [level=2] [ref=e2851]
                    - paragraph [ref=e2852]:
                      - text: SoSoValue is an on-chain finance platform, offering access to financial info & data, index & active trading tools and on-chain infrastructure. Such holistic foundation enables small teams to develop agentic finance applications on-chain, making the
                      - strong [ref=e2853]: "\"one-person business empire\""
                      - text: vision possible.
                    - paragraph [ref=e2854]: "The ecosystem consists of four three core components:"
                    - list [ref=e2855]:
                      - listitem [ref=e2856]:
                        - strong [ref=e2857]: SoSoValue Terminal
                        - text: ": an information and research hub offering structured financial news, data and market intelligence"
                      - listitem [ref=e2858]:
                        - strong [ref=e2859]: SSI Protocol
                        - text: ": one of industry's largest on-chain spot index protocol"
                      - listitem [ref=e2860]:
                        - strong [ref=e2861]: SoDEX & ValueChain
                        - text: ": a high-performance on-chain orderbook, powered by proprietary Layer-1 infrastructure; scalable, transparent, EVM-compatible and agent-friendly"
                    - paragraph [ref=e2862]: Together, they form a one-stop research-to-execution stack — from information and analysis, to index design, strategy, and trading execution.
