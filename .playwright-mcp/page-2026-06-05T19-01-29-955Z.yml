                  - heading "What it does" [level=2] [ref=e97]
                  - paragraph [ref=e98]: Edgework is performance intelligence for serious traders on SoDEX. It pulls every closed position from the public SoDEX API and slices winrate, expectancy, and total PNL across seven dimensions — hour of day, day of week, side, symbol, consecutive losses, position size quartile, and hold duration.
                  - paragraph [ref=e99]: "The output: traders see exactly where their edge is positive, where it's negative, and which setups quietly bleed PNL despite high win rates. Most traders discover that 60–80% of their losses come from 10–20% of their setups."
                  - heading "The problem it solves" [level=2] [ref=e100]
                  - paragraph [ref=e101]: "Most retail traders on perpetual DEXs lose money even when they have edge in market reading. The bottleneck isn't analysis — it's execution behavior. Every active trader has a personal anti-pattern: a setup, a time of day, an emotional state, or a market regime where their winrate collapses. Most never identify it because they look at PNL, not at conditional performance."
                  - paragraph [ref=e102]: PNL alone is the wrong abstraction. It compresses a thousand decisions into a single number. Edgework decompresses it.
                  - heading "Challenges I ran into" [level=2] [ref=e103]
                  - paragraph [ref=e104]: The biggest unlock was discovering — through reading the SoDEX docs carefully — that all read endpoints are public and require no signing. The first cut of the codebase had a full HMAC auth pipeline; once I understood the signing model is only for write actions (orders, transfers, leverage), I deleted 180 lines of auth code and the architecture got dramatically simpler.
                  - paragraph [ref=e105]:
                    - text: "Another challenge was the position schema: closed positions have"
                    - code [ref=e106]: size = 0
                    - text: because there's no open exposure left. The slicer initially showed all trades as
                    - code [ref=e107]: long
                    - text: and zero size. Switching to
                    - code [ref=e108]: positionSide
                    - text: and
                    - code [ref=e109]: cumClosedSize
                    - text: fixed it.
                  - heading "Technologies I used" [level=2] [ref=e110]
                  - list [ref=e111]:
                    - listitem [ref=e112]:
                      - strong [ref=e113]: Python 3.11
                      - text: — analytics core
                    - listitem [ref=e114]:
                      - strong [ref=e115]: Streamlit
                      - text: — live demo UI on Streamlit Cloud
                    - listitem [ref=e116]:
                      - strong [ref=e117]: Pandas + NumPy
                      - text: — slicer and normalization
                    - listitem [ref=e118]:
                      - strong [ref=e119]: Plotly
                      - text: — interactive PNL waterfall charts
                    - listitem [ref=e120]:
                      - strong [ref=e121]: Anthropic Claude (Sonnet 4)
                      - text: — AI Briefing layer
                    - listitem [ref=e122]:
                      - strong [ref=e123]: httpx + Pydantic Settings
                      - text: — typed clients with env-based config
                    - listitem [ref=e124]:
                      - strong [ref=e125]: SoDEX REST API
                      - text: — closed positions, account state, market data
                    - listitem [ref=e126]:
                      - strong [ref=e127]: SoSoValue API
                      - text: — news sentiment, ETF flows, SSI indexes, sector rotation
                    - listitem [ref=e128]:
                      - strong [ref=e129]: pytest
                      - text: — 6 unit tests covering normalization edge cases
                  - heading "How I built it" [level=2] [ref=e130]
                  - paragraph [ref=e131]:
                    - text: The core abstraction is the slicer module. It takes a normalized DataFrame of closed positions and produces seven slice DataFrames in parallel — each with
                    - code [ref=e132]: n_trades
                    - text: ","
                    - code [ref=e133]: winrate
                    - text: ","
                    - code [ref=e134]: avg_pnl
                    - text: ","
                    - code [ref=e135]: expectancy
                    - text: ","
                    - code [ref=e136]: total_pnl
                    - text: ","
                    - code [ref=e137]: avg_hold_minutes
                    - text: . Every dimension uses the same SliceStats output shape, which means the UI and the AI Briefing both consume them through one interface.
                  - paragraph [ref=e138]: The Streamlit app has a stat-card-plus-waterfall pattern per tab. The cards highlight the extremes (worst and best slices, with deduplication so the same slice never appears on both sides). The waterfall chart shows total PNL contribution per slice, color-coded by sign — so the trader sees not just where edge is negative but how much PNL each negative slice cost in absolute dollars.
                  - paragraph [ref=e139]:
                    - text: The AI Briefing module distills the slicer output into a
                    - code [ref=e140]: TraderEdge
                    - text: dataclass, combines it with a
                    - code [ref=e141]: MarketContext
                    - text: from SoSoValue (news sentiment, ETF flows, sector regime), and feeds both into a Claude prompt that returns a single 90–140 word paragraph. The prompt is engineered to refuse to invent stats — if a field is missing, the model omits it.
                  - heading "What I learned" [level=2] [ref=e142]
                  - paragraph [ref=e143]: Reading the docs carefully matters more than coding speed. I shipped a working analytics layer in about 6 hours of focused work because the first day I spent understanding the actual API contract, not guessing at it.
                  - paragraph [ref=e144]: "For SoDEX specifically: the public read endpoints are extraordinary for solo builders. Anyone can paste any wallet address and get the full closed position history. That single design decision is what makes Edgework trivially shareable — no login, no signature, no key management."
                  - heading "What's next for Edgework" [level=2] [ref=e145]
                  - paragraph [ref=e146]:
                    - strong [ref=e147]: Wave 2 — Leaderboard Benchmarking.
                    - text: The product becomes "find your edge" + "compare your edge to top-50 traders on the same pair, same regime." This benchmark is only defensible against builders who don't trade the platform — it's the moat.
                  - paragraph [ref=e148]:
                    - strong [ref=e149]: Wave 3 — Closing the loop.
                    - text: "EIP-712 signing for limit orders, so the AI Briefing's recommendations can be acted on directly from the same surface. Risk-control hooks: cooldowns triggered by Edgework's own anti-pattern detector, only when the trader explicitly opts in."
