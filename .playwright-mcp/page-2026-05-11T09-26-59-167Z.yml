                - textbox "Markdown editor" [ref=e193]: "## What it does CryptoDesk is a Bloomberg Terminal-style crypto intelligence dashboard that gives retail and professional traders a single interface to track live prices, ETF flows, macro events, crypto equities, and SSI index performance — all in real time. A universal search bar lets you type any ticker (BTC, ETH, SOL), macro event (CPI, FOMC, NFP), crypto equity (MSTR, COIN, MARA), or SSI index (MAG7, LAYER1) and the entire three-panel terminal re-contextualises instantly. ## The problem it solves Institutional traders have Bloomberg Terminals. Retail crypto investors have nothing comparable — they jump between five different tabs, miss macro catalysts, and have no integrated view of ETF flows, BTC treasury data, or index rebalancing signals. CryptoDesk closes that gap: one screen, all signals, zero subscription fee. ## Technologies I used - **Frontend**: React 19, Vite 8, Tailwind CSS 4, Recharts, Zustand - **Backend**: Node.js, Express 5, nodemon - **Data — live prices**: SoDEX public API (SoSoValue DEX) - **Data — market intelligence**: SoSoValue Open API (ETF flows, BTC treasury, SSI indices) - **AI briefs**: OpenRouter (Mistral-7B Instruct) with 10-minute cache - **Package manager**: pnpm ## How we built it The backend is a lightweight Express proxy that fans out to the SoSoValue Open API, SoDEX spot prices, Binance klines, and OpenRouter AI. An in-memory TTL cache protects the 20 req/min SoSoValue rate limit. A `normalizeSnap()` function maps the varying SoSoValue field names across endpoints into one consistent frontend shape. The frontend fires parallel `Promise.allSettled` requests for the market snapshot, news feed, and AI brief whenever a new search context loads. Partial failures degrade gracefully — an AI brief timeout never blocks price data. All four context types (currency, macro, stock, index) drive different chart overlays, stats panels, and scenario cards in the same three-panel shell. ## What we learned Building on SoSoValue's data infrastructure showed us how rich the SSI index and ETF flow datasets are — data that institutional desks pay for but retail users never see. The normalisation layer was the hardest part: each SoSoValue endpoint returns prices under slightly different field names, so a robust mapping layer is critical. ## What's next for CryptoDesk - **Wave 2**: Live trading directly through SoDEX from the Action Layer - **Wave 2**: Portfolio rebalancing calculator for SSI indices - **Wave 2**: Macro event alerts (push notifications before CPI/FOMC releases) - **Wave 3**: Mobile app with customisable watchlists and alert rules"
