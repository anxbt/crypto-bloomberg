                            - text: "What ships in Wave 1: ✅ SoDEX read-only API client — 8 endpoints, validated end-to-end against mainnet ✅ SoSoValue API client — news, ETF flows, SSI indexes, sectors ✅ Slicer module with 7 conditional performance dimensions (hour, day, side, symbol, consecutive losses, size quartile, hold duration) ✅ AI Briefing module powered by Anthropic Claude — combines trader edge with live market regime ✅ Streamlit live demo with stat cards + waterfall PNL charts ✅ Wallet-address fetch — paste any SoDEX wallet, no login or signature required ✅ TokenBar dark theme, brand-consistent UI ✅ 6 unit tests passing, 9+ commits showing iterative refinement ✅ Public deploy on Streamlit Cloud Validated against real SoDEX mainnet data: 500+ closed positions normalized correctly, 7 slicing dimensions producing meaningful conditional intelligence. Architecture decision worth highlighting: SoDEX read endpoints are public (no auth, no signing). Discovered this by reading the official docs carefully, which let me delete 180 lines of HMAC auth code and ship a much simpler architecture. EIP-712 signing for write actions is scoped to Wave 2+."
