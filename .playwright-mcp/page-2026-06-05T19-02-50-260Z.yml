                          - paragraph [ref=e1990]:
                            - text: "Wave 1 ships the full event-driven pipeline end-to-end: - News ingestion from SoSoValue OpenAPI with upstream dedup - AI classification (event type, sentiment, severity, affected assets, actionability) via Claude Sonnet 4.5 - Pre-classification corpus-similarity gate with signal-verb boost (rescues exploits, M&A, regulatory news on unfamiliar entities) - Significance scoring (magnitude × instance × novelty, drop gate at 0.25) - 7-axis weighted conviction scoring (classifier confidence, tradability, severity, source tier, polarity clarity, event-type weight, novelty) - Tier resolution (AUTO / REVIEW / INFO) with four downgrade caps: direction lock, history adjustment, base-rate cap, reliability cap - Vol-normalized risk derivation per (subtype × asset_class) - Lifecycle + event_chain_id binding signals on the same evolving story - Per-signal /signal/[id] audit page pulling six tables into one decision narrative - AlphaIndex: paper-traded AI-managed crypto index across BTC/ETH/L1s/RWA/sector baskets with AI-written rebalance rationale - 400+ Vitest specs covering critical invariants - Public deploy on Vercel with snapshot-hydrated SQLite - Landing page with three live evidence panels linking into the dashboard Live demo:"
