                        - generic [ref=e1346]:
                          - generic [ref=e1347]: Updates in this Wave
                          - paragraph [ref=e1349]:
                            - text: "Sonar is an ETF-flow-aware agentic hedge fund built end-to-end on the SoSoValue stack. Wave 1 ships paper execution; Wave 2 wires it live. Live demo:"
                            - link "https://sonar.my.id/" [ref=e1350] [cursor=pointer]:
                              - /url: https://sonar.my.id/
                            - text: "Repo:"
                            - link "https://github.com/OoJae/sonar" [ref=e1351] [cursor=pointer]:
                              - /url: https://github.com/OoJae/sonar
                            - text: "SoSoValue API. Live on the High Frequency tier (100 rpm). Five /openapi/v1 endpoints wired to actual wire format: currencies, ETF summary history, ETF list, featured news with title extraction. Rolling token bucket, per-endpoint TTL caching, fixture mode. Agent. Single-agent loop on mimo-v2.5-pro through the Anthropic-compatible relay. Seven typed tools (currency lookup, ETF flow series, ETF list, featured news, SSI single read, SSI all-index read, submit thesis). Tool loop bounded at 16 steps. Thesis schema. Every numeric token in the agent's prose must carry a [ref:signalId] tag resolving to a signal in the same thesis. Risk notes mandatory. Target weights sum to <=1.0. Validator rejects on failure; failed runs are persisted on /log as transparent history. Citation renderer. /signals walks the reasoning and replaces each [ref:id] token with a numbered superscript. News refs link to the source article; ETF-flow refs show an asset/direction/window tooltip. Sources footer lists every ref. Freshness rule. If the latest ETF flow is older than 36 hours the agent emits a no-trade thesis. Verified live: weekend cycles correctly hold instead of trading on Friday-close data. SSI Protocol reader on Base. viem multicall against MAG7.ssi, DEFI.ssi, MEME.ssi, USSI. Real getTokenset() returns 7/10/10/0 underlying tokens, verified against Base mainnet. Paper trading engine. Drizzle-backed, mirrors the live SoDEX OrderRequest shape so the Wave 2 swap is a one-file change. Sizing: target weight x book equity (with a $100k seed), $10 dust threshold. Verified live: one cycle placed three trades (MAG7 buy $35k, DEFI buy $20k, MEME buy $11.5k). SoDEX bonus integration. Thin live client hits /rest/v1/spot/pairs and /rest/v1/time for venue listing and health, displayed on the dashboard. MCP servers. Three stdio MCP servers wrapping SoSoValue, SSI, and the SoDEX paper engine. Dashboard. Three pages (Signals, Portfolio, Log) on a dark-navy + gold financial-terminal aesthetic. Pure-SVG ETF flow bars. Numbered superscript citations link to sources. Date+mode chips on /portfolio deep-link to /log#run-<id>. Operations. Self-hosted VPS. nginx reverse proxy. Postgres in Docker with restart=unless-stopped. Host crontab at 21:30 UTC weekdays. CRON_SECRET bearer guard on /api/cron/daily and /api/agent/run. Production boot guard refuses startup without CRON_SECRET in production. Verified end-to-end: the most recent live cycle (run 26d87125, thesis 44bb18b3) ingested signals from the live SoSoValue API, produced a fully cited trade thesis, and executed paper trades that rendered on all three dashboard pages with working citation links."
