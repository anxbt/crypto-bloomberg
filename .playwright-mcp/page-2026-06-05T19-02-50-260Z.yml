                          - paragraph [ref=e1214]:
                            - text: "SoSoMind · Agentic Finance OS for Crypto Traders 🧠 SoSoMind is a production-deployed AI trading intelligence platform — specialist agents making real decisions from live data, enforcing risk rules, and executing trades non-custodially on SoDEX Testnet across 32 live spot pairs. 🌐 Live:"
                            - link "https://sosomind.vercel.app/" [ref=e1215] [cursor=pointer]:
                              - /url: https://sosomind.vercel.app/
                            - text: "📚 Docs:"
                            - link "https://sosomind.vercel.app/docs" [ref=e1216] [cursor=pointer]:
                              - /url: https://sosomind.vercel.app/docs
                            - text: "🎥 Demo videos in comments. ⚙️ Five Specialist AI Agents Research Agent — 13+ live sources in parallel: SoSoValue sector indexes, ETF flows, macro calendars, fundraising rounds, BTC treasuries, news, SoDEX orderbook. Generates direction, confidence, entry, TP, SL, cited reasoning via 6-provider chain: Cerebras → SambaNova → Together → OpenRouter → Groq → Gemini. Risk Agent enforces: • 3 trades/asset daily cap • 30% concentration limit • ATR volatility filter (>15% blocked) • -5% drawdown halt • Circuit breaker after 3 consecutive losses • Kelly Criterion position sizing Execution Agent — EIP-712 LIMIT + IOC orders. AES-256-GCM encrypted keys decrypted only in-memory. MEV protection on every order. Macro Overlay Agent — integrates Fed, CPI, yield curve, and employment data into real-time signal bias. Sector Rotation Agent — reallocates portfolio weights across 13 SSI sectors by momentum score. 📊 Sector Intelligence System (SSI) 13 sectors scored 0–100: • Fundraising Velocity 30% • Institutional Momentum 35% • 30-day Trend 35% 🖥️ Dashboard — Next.js 14 · React 19 · TypeScript · Framer Motion v12 Signals · Sectors · Research · Portfolio · Macro · Newsletter · Rebalance · Methodology · Docs · Roadmap 🤖 Telegram Bot — @SosoMindbot 17 features: non-custodial EVM wallets · AI research · live trade execution · sector baskets · whale alerts · arbitrage scanner · paper trading · voice briefs (ElevenLabs) · A2A protocol 📡 Infrastructure • SoSoValue: 35 endpoints / 9 modules • mcp-sodex: 25 tools (live) • mcp-sosovalue (live) • 5 WebSocket channels · Supabase · Upstash Redis • Express · Node 20 · ethers.js v6 · grammY · Next.js 14 🛣️ Next Waves • SoDEX Mainnet · Signal Marketplace · Mobile App · Strategy Builder • OpenClaw Skills: Market Research · Risk Monitor · Portfolio Briefing · Trade Execution · Content Studio • MCP: Claude Desktop · Cursor · VS Code Copilot"
