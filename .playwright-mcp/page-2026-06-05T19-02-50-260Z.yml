                          - paragraph [ref=e1083]:
                            - text: "**TradeFirewall** is a pre-trade crypto risk engine that helps users avoid dangerous trades before execution. Instead of building another crypto signal bot that tells users what to buy, TradeFirewall focuses on risk prevention. A user enters a proposed trade, and the app analyzes market conditions, liquidity, volatility, position size, holding period, and execution risk to generate a clear risk score, explanation, and safer action recommendation. The goal is to create a safety layer between trade idea and execution for crypto traders, signal groups, DeFi users, wallets, and trading communities. ### Updates completed in this wave In this wave, we built the first working version of TradeFirewall and focused on turning the idea into a usable product MVP. We completed the **Home / Landing Page** with a professional crypto analytics design inspired by platforms like Token Terminal. The landing page explains the problem, the solution, the product flow, and the business model. We built the main **Trade Risk Engine** page where users can enter a proposed trade, including asset, buy/sell direction, trade amount, holding period, risk profile, and optional notes. This page is the core of the product. We added a structured risk workflow that validates user input, analyzes trade risk conditions, calculates a risk score, and returns a decision: **Approve, Caution, Reduce/Wait, or Block**. We also added a **Risk Intelligence Explanation** section that explains the result in simple language using rule-based logic. This helps users understand why a trade may be risky instead of only showing numbers. The risk report includes a **Risk Breakdown Table** covering factors such as volatility, liquidity, market momentum, position size, holding period risk, and execution risk. We added a **Recommended Action** section that tells users whether to proceed carefully, reduce position size, wait, cancel, or add the asset to a watchlist. For safety, we added a **Confirmation Gate** for high-risk trades. Users must acknowledge the risk before moving toward any execution-preview step. We built the **Trading Dashboard** to show saved risk reports, recent trade checks, watchlist assets, high-risk alerts, and overall risk history. We also built an **API / Docs page** explaining how TradeFirewall can later be used by wallets, trading bots, signal groups, and DeFi applications. We planned the SoSoValue integration as the main market intelligence layer and SoDEX as the market microstructure/execution-preview layer for ticker, orderbook, liquidity, klines, recent trades, and slippage estimation. ### Deliverable Live Demo:"
