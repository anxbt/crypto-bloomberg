                        - generic [ref=e1858]:
                          - generic [ref=e1859]: Updates in this Wave
                          - paragraph [ref=e1861]: "HypeNode 1st Wave ships a working Indexer MVP: a single trader can research → simulate → deploy → monitor a crypto index portfolio end-to-end on-chain, no manual market-watching. DELIVERED - Auth — SIWE + iron-session via Privy modal (email / Google / Twitter / wallet). Email + social create a Privy MPC embedded EOA so users without MetaMask can sign on-chain. WalletMismatchBanner blocks address-mismatch. - Dashboard — Sector momentum, SSI snapshots, trending news, smart-money widget (BTC treasuries), macro calendar — all live from SoSoValue Terminal. - Builder (5 steps) — Signal → Constituents → Weights → Simulate → Deploy. Real 90-day backtest replays SoSoValue klines; computes Sharpe / Max DD / Win rate vs BTC + ETH. Sign & Deploy via wagmi to SSIRegistry.registerIndex on Sepolia. Registry verified at 0xF775D9634bFCe4D0F1F56874873FE6cb35A28CA5. - Portfolio — Real positions via SSI Registry creator filter + SoDEX spot balances + reference benchmark, USD-priced at snapshot level. - LangGraph agent — Python FastAPI + 10-node state machine (signal → research → draft → backtest → review → execute → monitor → risk → hedge → settle). Reasoning persists to SQLite; /agent polls every 5s. Pause / Step / Reset / Halt controls. - Chat agent — Multi-provider (Claude or GPT-4o). 24 tools: 13 hit SoSoValue, plus SoDEX spot + perps trading + cross-product transfer (browser-signed EIP-712, server never holds keys), risk gates, real backtest, RootData, treasuries, macro. - SoDEX via chat — Spot (vSOL_vUSDC) + perps (SOL-USD with leverage) + cross-product transferAsset between spot and perps margin accounts. Auto-routes to perps when spot is cancel-only. Auto-switches MetaMask to ValueChain testnet 138565. Single-use envelopes block nonce replay; inner-code check catches silent rejects; transfer envelopes use the 999 virtual chain-aid pattern per SoDEX REST v1. - Risk page — Persistent drawdown + vol + sentiment + weight + outflow caps with per-rule toggles + manual override. Honored by the agent each cycle. - History — Decision log in SQLite, one row per cycle (sector, basket, risk verdict, breaches, SoDEX placed/errors, SSI tx hash). - SoSoValue transport — Token-bucket dispatcher (20-burst), per-path TTL (klines/news 30s, currencies 5min, default 15min), in-flight dedup, stale-on-failure, error-class backoffs. Browser proxy keeps the API key server-side. - Standalone MCP server — 8 tools for external Claude Desktop / MCP clients. SCALE: 30 pages · 56 API routes · 9 SoSoValue endpoint families · 23 endpoints · Sepolia deploy verified."
