                          - paragraph [ref=e506]:
                            - text: "Wave 2 Update : In the past, wave 1 was a prototype — hardcoded signals, no real data, no execution. Wave 2 is where it becomes real: a full signal-to-execution trading platform with live wallet connectivity, live orders, AI-enhanced reasoning, and a command-center dashboard built for serious traders. Live :"
                            - link "https://signalflowagent.vercel.app" [ref=e507] [cursor=pointer]:
                              - /url: https://signalflowagent.vercel.app
                            - text: "GitHub :"
                            - link "https://github.com/nohypelabs/signalflow-agent" [ref=e508] [cursor=pointer]:
                              - /url: https://github.com/nohypelabs/signalflow-agent
                            - text: "https:"
                            - link "https://signalflowagent.vercel.app/docs" [ref=e509] [cursor=pointer]:
                              - /url: https://signalflowagent.vercel.app/docs
                            - text: "Product Walkthrough :"
                            - link "https://youtu.be/LcN7pJp1Ftc?si=JJtjsX8CdzPYN7nI" [ref=e510] [cursor=pointer]:
                              - /url: https://youtu.be/LcN7pJp1Ftc?si=JJtjsX8CdzPYN7nI
                            - text: "--- New Icon for Logo New Icon, New Spirit for building. Wallet & Trading MetaMask + WalletConnect v2 on ValueChain mainnet (chain ID 286623, SOSO). Smart connector detects window.ethereum on desktop and falls back to WalletConnect QR/deep links on mobile. EIP-712 typed-data signing for SoDEX spot orders — users sign directly through their wallet, no custody. Trade modal includes live ticker price, wallet balance, 25/50/75/100% quick-fill buttons, cost preview, and Sign & Submit flow. Order dashboard tracks open/filled/canceled status with cancel support. Requests proxied via /api/orders and /api/balance. AI Signal Enhancement Multi-provider AI selection: Deepseek, OpenAI, and OpenRouter. User-supplied API keys stored locally in the browser — never sent to SignalFlow servers. Per-dimension reasoning explains each signal: entry, stop-loss, take-profit, confidence, and position sizing. Decision Score syncs live with the signal engine on /signals. SoSoValue & Market Data ETF flow, news sentiment, macro indicators, BTC treasury, and index snapshots fully integrated. Quota-aware degraded states keep panels functional at API limits — degrades gracefully, never silently. Catalyst Monitor replaces the old news feed with a Bloomberg-style event tape: live signal events, market movers, liquidity leaders, and SoDEX status. Command Center Dashboard Redesigned /dashboard: pipeline rail → market canvas → Decision Score → Catalyst Monitor → evidence strip (Market Pressure, Signal Reliability, Macro Tape, Execution Readiness). Traffic-light LONG/SHORT/NO TRADE state pulled directly from the live signal engine. Mobile & PWA Full PWA: manifest.json, custom icons, service worker, Apple Web App metadata, standalone display mode. Responsive mobile layout: compact header, drawer sidebar, bottom navigation, scroll lock, safe-bottom padding for notched devices. UX & Validation Paper futures flow for pre-execution signal validation. Four trading modes: Scalping, Intraday, Swing, Position — each with distinct confidence thresholds, factor weights, TP/SL behavior, and leverage caps. Multi-timeframe confluence across 1H, 4H, 1D. Backtest page: win rate, profit factor, drawdown, equity curve, per-regime accuracy."
