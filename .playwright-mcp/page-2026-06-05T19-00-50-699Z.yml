                          - paragraph [ref=e692]:
                            - text: "Wave 2 delivers all four declared goals plus additional polish. Real SoDEX execution: lib/sodex.ts now implements a full server-side spot client - quote, EIP-712 signing, batchNewOrder submission, and result handling. A real mainnet order (sell 0.0027 ETH → 5.59 USDC) was executed and filled to validate the signature pipeline end-to-end. Live URL:"
                            - link "https://indexpilots.vercel.app" [ref=e693] [cursor=pointer]:
                              - /url: https://indexpilots.vercel.app
                            - text: "AI explanation layer: Every rebalance event now triggers a Claude Sonnet 4.6 briefing via /api/briefing. The response is structured JSON (headline, drift summary, trade rationale, risk note, confidence level) and streams progressively. The briefing explicitly describes cash deployment when USDC is present. Real onchain balance reads: useWalletBalances reads native ETH and ERC-20s (WBTC, WETH, WSOL, WBNB, WAVAX, USDC) via wagmi on Ethereum mainnet. On testnet, balances read from the SoDEX account B array directly. USDC is treated as deployable cash — counted in total value and spent by the rebalance plan. Testnet/Mainnet network switcher: Interactive toggle in the global header with localStorage persistence. Switching to mainnet requires a confirm modal. Defaults to testnet so judges can test freely without spending real funds. API visibility tray: Live log of every SoSoValue, Anthropic, and SoDEX call with timestamps, latency, and HTTP status. Judges can verify all data is real. README rewritten with architecture diagram, file structure, and Wave 2 checklist."
